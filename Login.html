<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Login — Gudang Cafe Zero Six</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
  #pinScreen{
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px;
  }
  .ticket h1{ font-size:14px; letter-spacing:3px; text-transform:uppercase; color:var(--ink-soft); margin:0 0 4px; }
  .ticket h2{ font-size:22px; margin:0 0 20px; font-weight:700; }
  #pinDots{ display:flex; gap:12px; justify-content:center; margin-bottom:20px; }
  #pinDots span{
    width:14px; height:14px; border-radius:50%; border:1.5px solid var(--ink);
    display:inline-block;
  }
  #pinDots span.filled{ background:var(--ink); }
  .keypad{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .keypad button{
    font-family:'IBM Plex Mono', monospace; font-size:20px; font-weight:600;
    padding:16px 0; background:var(--paper); border:1px solid var(--line); color:var(--ink);
    border-radius:var(--radius);
  }
  .keypad button:active{ background:var(--paper-dark); }
  #pinError{ color:var(--stamp); font-size:12px; margin-top:12px; min-height:16px; font-weight:600; }
</style>
</head>
<body>

<div id="pinScreen">
  <div class="ticket">
    <h1>Login Admin</h1>
    <h2>Masukkan PIN</h2>
    <div id="pinDots">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="keypad">
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
      <button data-k="del">⌫</button><button data-k="0">0</button><button data-k="ok">✓</button>
    </div>
    <div id="pinError"></div>
  </div>
</div>

<script src="common.js"></script>
<script>
let pinBuffer = '';
const pinDots = document.querySelectorAll('#pinDots span');

function renderPinDots() {
  pinDots.forEach((d, i) => d.classList.toggle('filled', i < pinBuffer.length));
}

document.querySelectorAll('.keypad button').forEach(btn => {
  btn.addEventListener('click', () => {
    const k = btn.dataset.k;
    if (k === 'del') {
      pinBuffer = pinBuffer.slice(0, -1);
    } else if (k === 'ok') {
      submitPin();
      return;
    } else if (pinBuffer.length < 4) {
      pinBuffer += k;
    }
    renderPinDots();
    if (pinBuffer.length === 4) submitPin();
  });
});

async function submitPin() {
  document.getElementById('pinError').textContent = '';
  showLoading('Memeriksa PIN…');
  try {
    const res = await api('login', { pin: pinBuffer });
    hideLoading();
    if (res.success) {
      sessionStorage.setItem('czs_user', res.nama);
      location.href = 'menu.html';
    } else {
      document.getElementById('pinError').textContent = res.message || 'PIN salah.';
      pinBuffer = '';
      renderPinDots();
    }
  } catch (err) {
    hideLoading();
    document.getElementById('pinError').textContent = 'Gagal terhubung ke server.';
    pinBuffer = '';
    renderPinDots();
  }
}

// kalau sudah login sebelumnya (sesi masih aktif), langsung ke menu
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('czs_user')) location.href = 'menu.html';
});
</script>
</body>
</html>
