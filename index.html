<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gudang — Cafe Zero Six</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EAE2CC;
    --paper-dark:#DCD1AF;
    --ink:#2A2418;
    --ink-soft:#6B6350;
    --stamp:#A5382B;
    --ledger:#3E5641;
    --line:#C7BB98;
    --card:#F5F0E1;
    --radius:2px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.025) 0px, rgba(0,0,0,0.025) 1px, transparent 1px, transparent 3px);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    padding-bottom:90px;
  }
  .num{ font-family:'IBM Plex Mono', monospace; }

  header.topbar{
    position:sticky; top:0; z-index:20;
    background:var(--ink);
    color:var(--paper);
    padding:14px 18px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:3px solid var(--stamp);
  }
  header.topbar .brand{ display:flex; flex-direction:column; }
  header.topbar .brand .kecil{ font-size:10px; letter-spacing:2px; text-transform:uppercase; opacity:0.65; }
  header.topbar .brand .besar{ font-size:17px; font-weight:700; letter-spacing:0.5px; }
  header.topbar .user{ font-size:12px; text-align:right; opacity:0.85; }
  header.topbar .user button{
    margin-top:4px; background:none; border:1px solid rgba(255,255,255,0.3);
    color:var(--paper); font-size:10px; padding:3px 8px; border-radius:var(--radius);
  }

  main{ max-width:520px; margin:0 auto; padding:16px; }

  /* ===== PIN SCREEN ===== */
  #pinScreen{
    min-height:calc(100vh - 60px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px;
  }
  .ticket{
    background:var(--card);
    border:1.5px dashed var(--ink-soft);
    padding:28px 24px;
    width:100%; max-width:340px;
    text-align:center;
    position:relative;
  }
  .ticket::before, .ticket::after{
    content:''; position:absolute; width:16px; height:16px; background:var(--paper);
    border-radius:50%; top:50%; margin-top:-8px;
  }
  .ticket::before{ left:-9px; }
  .ticket::after{ right:-9px; }
  .ticket h1{ font-size:14px; letter-spacing:3px; text-transform:uppercase; color:var(--ink-soft); margin:0 0 4px; }
  .ticket h2{ font-size:22px; margin:0 0 20px; font-weight:700; }
  #pinDots{ display:flex; gap:12px; justify-content:center; margin-bottom:20px; }
  #pinDots span{
    width:14px; height:14px; border-radius:50%; border:1.5px solid var(--ink);
    display:inline-block;
  }
  #pinDots span.filled{ background:var(--ink); }
  .keypad{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .keypad button{
    font-family:'IBM Plex Mono', monospace; font-size:20px; font-weight:600;
    padding:16px 0; background:var(--paper); border:1px solid var(--line); color:var(--ink);
    border-radius:var(--radius);
  }
  .keypad button:active{ background:var(--paper-dark); }
  #pinError{ color:var(--stamp); font-size:12px; margin-top:12px; min-height:16px; font-weight:600; }

  /* ===== MENU ===== */
  .menu-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px; }
  .menu-card{
    background:var(--card); border:1px solid var(--line);
    padding:20px 14px; text-align:left; border-radius:var(--radius);
    display:flex; flex-direction:column; gap:6px;
  }
  .menu-card .glyph{ font-size:22px; }
  .menu-card .label{ font-weight:700; font-size:14px; }
  .menu-card .desc{ font-size:11px; color:var(--ink-soft); }
  .menu-card.masuk{ border-left:4px solid var(--ledger); }
  .menu-card.keluar{ border-left:4px solid var(--stamp); }

  .ringkasan{
    background:var(--card); border:1px solid var(--line); padding:14px 16px;
    margin-bottom:14px; border-radius:var(--radius);
  }
  .ringkasan .baris{ display:flex; justify-content:space-between; font-size:12px; padding:4px 0; }
  .ringkasan .baris b{ font-family:'IBM Plex Mono', monospace; }
  .ringkasan .warn{ color:var(--stamp); font-weight:600; }

  /* ===== FORM SCREENS ===== */
  .screen-header{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .back-btn{
    background:none; border:1px solid var(--ink); width:32px; height:32px; border-radius:50%;
    font-size:16px; line-height:1; color:var(--ink);
  }
  .screen-title{ font-size:18px; font-weight:700; }

  label.field-label{ font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--ink-soft); display:block; margin-bottom:5px; margin-top:14px; }
  input[type=date], input[type=text], select{
    width:100%; padding:11px 12px; border:1px solid var(--line); background:#fff;
    border-radius:var(--radius); font-size:15px; font-family:'IBM Plex Sans', sans-serif; color:var(--ink);
  }

  .item-row{
    background:var(--card); border:1px solid var(--line); padding:12px; margin-top:10px; border-radius:var(--radius);
    position:relative;
  }
  .item-row .hapus-item{
    position:absolute; top:8px; right:8px; background:none; border:none; color:var(--ink-soft); font-size:16px;
  }
  .item-row .produk-info{ font-size:11px; color:var(--ink-soft); margin-top:4px; min-height:14px; }
  .item-row .produk-info.stock-ok{ color:var(--ledger); }
  .item-row .produk-info.stock-low{ color:var(--stamp); font-weight:600; }

  .autocomplete-wrap{ position:relative; }
  .autocomplete-list{
    position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid var(--line);
    max-height:220px; overflow-y:auto; z-index:30; border-radius:var(--radius);
    box-shadow:0 6px 14px rgba(0,0,0,0.12);
  }
  .autocomplete-item{ padding:10px 12px; border-bottom:1px solid #eee; font-size:13px; }
  .autocomplete-item:last-child{ border-bottom:none; }
  .autocomplete-item .nm{ font-weight:600; }
  .autocomplete-item .meta{ font-size:11px; color:var(--ink-soft); margin-top:2px; }
  .autocomplete-item:active{ background:var(--paper); }

  .qty-input{ margin-top:8px; }

  .btn-tambah-baris{
    width:100%; margin-top:12px; padding:12px; background:none; border:1.5px dashed var(--ink-soft);
    color:var(--ink-soft); font-size:13px; font-weight:600; border-radius:var(--radius);
  }

  .btn-submit{
    width:100%; margin-top:20px; padding:15px; background:var(--ink); color:var(--paper);
    border:none; font-size:15px; font-weight:700; border-radius:var(--radius); letter-spacing:0.5px;
  }
  .btn-submit:disabled{ opacity:0.5; }
  .btn-submit.keluar-mode{ background:var(--stamp); }
  .btn-submit.masuk-mode{ background:var(--ledger); }

  #formMsg{ margin-top:12px; font-size:13px; text-align:center; font-weight:600; min-height:18px; }
  #formMsg.err{ color:var(--stamp); }
  #formMsg.ok{ color:var(--ledger); }

  /* ===== STOCK LIST ===== */
  .stock-search{ margin-bottom:14px; }
  .stock-item{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--card); border:1px solid var(--line); padding:10px 12px; margin-top:8px; border-radius:var(--radius);
  }
  .stock-item .nm{ font-size:13px; font-weight:600; }
  .stock-item .kat{ font-size:10px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.5px; }
  .stock-item .jml{ font-family:'IBM Plex Mono', monospace; font-size:16px; font-weight:700; }
  .stock-item.low .jml{ color:var(--stamp); }
  .stock-item .satuan{ font-size:10px; color:var(--ink-soft); }

  .hidden{ display:none !important; }

  .loading-overlay{
    position:fixed; inset:0; background:rgba(42,36,24,0.55); z-index:100;
    display:flex; align-items:center; justify-content:center;
  }
  .loading-box{ background:var(--card); padding:18px 24px; border-radius:var(--radius); font-size:13px; font-weight:600; }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="kecil">Gudang</span>
    <span class="besar">CAFE ZERO SIX</span>
  </div>
  <div class="user hidden" id="userBox">
    <span id="userName"></span>
    <button id="logoutBtn">Keluar</button>
  </div>
</header>

<!-- PIN SCREEN -->
<div id="pinScreen">
  <div class="ticket">
    <h1>Login Admin</h1>
    <h2>Masukkan PIN</h2>
    <div id="pinDots">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="keypad">
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
      <button data-k="del">⌫</button><button data-k="0">0</button><button data-k="ok">✓</button>
    </div>
    <div id="pinError"></div>
  </div>
</div>

<!-- MAIN APP -->
<main id="app" class="hidden">

  <!-- MENU -->
  <div id="screenMenu">
    <div class="ringkasan" id="ringkasanBox">Memuat ringkasan…</div>
    <div class="menu-grid">
      <button class="menu-card masuk" data-goto="masuk">
        <span class="glyph">📥</span>
        <span class="label">Barang Masuk</span>
        <span class="desc">Catat barang dari supplier</span>
      </button>
      <button class="menu-card keluar" data-goto="keluar">
        <span class="glyph">📤</span>
        <span class="label">Barang Keluar</span>
        <span class="desc">Barang diambil ke cafe</span>
      </button>
      <button class="menu-card" data-goto="stock">
        <span class="glyph">📋</span>
        <span class="label">Cek Stock</span>
        <span class="desc">Lihat semua stok produk</span>
      </button>
      <button class="menu-card" data-goto="tambahproduk">
        <span class="glyph">➕</span>
        <span class="label">Produk Baru</span>
        <span class="desc">Tambah master produk</span>
      </button>
    </div>
  </div>

  <!-- BARANG MASUK -->
  <div id="screenMasuk" class="hidden">
    <div class="screen-header">
      <button class="back-btn" data-back="menu">←</button>
      <span class="screen-title">📥 Barang Masuk</span>
    </div>
    <label class="field-label">Tanggal</label>
    <input type="date" id="masukTanggal">
    <div id="masukItems"></div>
    <button class="btn-tambah-baris" id="masukTambahBaris">➕ Tambah Baris</button>
    <button class="btn-submit masuk-mode" id="masukSubmit">Simpan Barang Masuk</button>
    <div id="masukMsg"></div>
  </div>

  <!-- BARANG KELUAR -->
  <div id="screenKeluar" class="hidden">
    <div class="screen-header">
      <button class="back-btn" data-back="menu">←</button>
      <span class="screen-title">📤 Barang Keluar</span>
    </div>
    <label class="field-label">Tanggal</label>
    <input type="date" id="keluarTanggal">
    <label class="field-label">Petugas (yang mengambil barang)</label>
    <select id="keluarPetugas"><option value="">— pilih petugas —</option></select>
    <div id="keluarItems"></div>
    <button class="btn-tambah-baris" id="keluarTambahBaris">➕ Tambah Baris</button>
    <button class="btn-submit keluar-mode" id="keluarSubmit">Simpan Barang Keluar</button>
    <div id="keluarMsg"></div>
  </div>

  <!-- CEK STOCK -->
  <div id="screenStock" class="hidden">
    <div class="screen-header">
      <button class="back-btn" data-back="menu">←</button>
      <span class="screen-title">📋 Cek Stock</span>
    </div>
    <input type="text" class="stock-search" id="stockSearch" placeholder="Cari nama produk…">
    <div id="stockList"></div>
  </div>

  <!-- TAMBAH PRODUK -->
  <div id="screenTambahProduk" class="hidden">
    <div class="screen-header">
      <button class="back-btn" data-back="menu">←</button>
      <span class="screen-title">➕ Produk Baru</span>
    </div>
    <label class="field-label">Nama Produk</label>
    <input type="text" id="tpNama" placeholder="Contoh: Sirup Karamel">
    <label class="field-label">Kategori</label>
    <select id="tpKategori">
      <option value="Bar">🍸 Bar</option>
      <option value="Koki">🍳 Koki</option>
      <option value="Produk">📦 Produk</option>
      <option value="Inventaris">🧹 Inventaris</option>
    </select>
    <label class="field-label">Minimal Stock (untuk peringatan restock)</label>
    <input type="text" id="tpMinimal" inputmode="numeric" placeholder="Contoh: 5">
    <button class="btn-submit masuk-mode" id="tpSubmit">Simpan Produk</button>
    <div id="tpMsg"></div>
  </div>

</main>

<script>
/* ============================================================
   GANTI URL INI dengan URL Web App hasil Deploy Apps Script kamu
   ============================================================ */
const API_URL = "https://script.google.com/macros/s/AKfycbxfioQAfS5bK76XqlIkDH6csro9VfFbVnslvg4B0aYj7fRjwTHbaLc4M7oEcfGeKNZw-g/exec";

/* ---------- helper API ---------- */
async function api(action, payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // hindari CORS preflight
    body: JSON.stringify({ action, payload: payload || {} })
  });
  return res.json();
}

function showLoading(msg) {
  const el = document.createElement('div');
  el.className = 'loading-overlay';
  el.id = 'loadingOverlay';
  el.innerHTML = '<div class="loading-box">' + (msg || 'Memproses…') + '</div>';
  document.body.appendChild(el);
}
function hideLoading() {
  const el = document.getElementById('loadingOverlay');
  if (el) el.remove();
}

/* ---------- state ---------- */
let pinBuffer = '';
let currentUser = null;

/* ---------- PIN screen ---------- */
const pinDots = document.querySelectorAll('#pinDots span');
function renderPinDots() {
  pinDots.forEach((d, i) => d.classList.toggle('filled', i < pinBuffer.length));
}
document.querySelectorAll('.keypad button').forEach(btn => {
  btn.addEventListener('click', () => {
    const k = btn.dataset.k;
    if (k === 'del') {
      pinBuffer = pinBuffer.slice(0, -1);
    } else if (k === 'ok') {
      submitPin();
      return;
    } else if (pinBuffer.length < 4) {
      pinBuffer += k;
    }
    renderPinDots();
    if (pinBuffer.length === 4) submitPin();
  });
});

async function submitPin() {
  document.getElementById('pinError').textContent = '';
  showLoading('Memeriksa PIN…');
  try {
    const res = await api('login', { pin: pinBuffer });
    hideLoading();
    if (res.success) {
      currentUser = res.nama;
      sessionStorage.setItem('czs_user', currentUser);
      enterApp();
    } else {
      document.getElementById('pinError').textContent = res.message || 'PIN salah.';
      pinBuffer = '';
      renderPinDots();
    }
  } catch (err) {
    hideLoading();
    document.getElementById('pinError').textContent = 'Gagal terhubung ke server.';
    pinBuffer = '';
    renderPinDots();
  }
}

function enterApp() {
  document.getElementById('pinScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userBox').classList.remove('hidden');
  document.getElementById('userName').textContent = currentUser;
  loadRingkasan();
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('czs_user');
  location.reload();
});

// cek sesi tersimpan (biar tidak perlu input PIN tiap buka app)
window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('czs_user');
  if (saved) {
    currentUser = saved;
    enterApp();
  }
  document.getElementById('masukTanggal').valueAsDate = new Date();
  document.getElementById('keluarTanggal').valueAsDate = new Date();
});

/* ---------- navigasi antar screen ---------- */
const screens = ['Menu', 'Masuk', 'Keluar', 'Stock', 'TambahProduk'];
function goto(name) {
  screens.forEach(s => document.getElementById('screen' + s).classList.add('hidden'));
  const target = name.charAt(0).toUpperCase() + name.slice(1);
  document.getElementById('screen' + target).classList.remove('hidden');
  if (name === 'stock') loadStockList();
  if (name === 'keluar') loadPetugasOptions();
}
document.querySelectorAll('[data-goto]').forEach(btn => {
  btn.addEventListener('click', () => goto(btn.dataset.goto));
});
document.querySelectorAll('[data-back]').forEach(btn => {
  btn.addEventListener('click', () => { goto(btn.dataset.back); loadRingkasan(); });
});

/* ---------- ringkasan (dashboard mini di menu) ---------- */
async function loadRingkasan() {
  const box = document.getElementById('ringkasanBox');
  box.textContent = 'Memuat ringkasan…';
  try {
    const res = await api('getRingkasanStock', {});
    if (!res.success) { box.textContent = 'Gagal memuat ringkasan.'; return; }
    let html = '';
    html += '<div class="baris"><span>Total Produk Aktif</span><b class="num">' + res.totalProduk + '</b></div>';
    html += '<div class="baris"><span>Total Stock (semua pcs)</span><b class="num">' + res.totalStock + '</b></div>';
    if (res.habis.length > 0) {
      html += '<div class="baris warn"><span>⚠️ Stock Habis</span><b class="num">' + res.habis.length + '</b></div>';
    }
    if (res.hampirHabis.length > 0) {
      html += '<div class="baris warn"><span>⚠️ Perlu Restock</span><b class="num">' + res.hampirHabis.length + '</b></div>';
    }
    box.innerHTML = html;
  } catch (e) {
    box.textContent = 'Gagal terhubung ke server.';
  }
}

/* ---------- autocomplete produk (dipakai di Masuk & Keluar) ---------- */
let searchTimer = null;
function attachAutocomplete(inputEl, listEl, onPick) {
  inputEl.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = inputEl.value;
    searchTimer = setTimeout(async () => {
      const res = await api('searchProduk', { query: q });
      if (!res.success) return;
      renderAutocompleteList(listEl, res.data, onPick);
    }, 250);
  });
  inputEl.addEventListener('focus', () => {
    if (listEl.children.length > 0) listEl.classList.remove('hidden');
  });
  document.addEventListener('click', (e) => {
    if (!listEl.contains(e.target) && e.target !== inputEl) listEl.classList.add('hidden');
  });
}
function renderAutocompleteList(listEl, items, onPick) {
  if (items.length === 0) { listEl.innerHTML = ''; listEl.classList.add('hidden'); return; }
  listEl.innerHTML = items.map((p, i) => {
    const glyph = { Bar: '🍸', Koki: '🍳', Produk: '📦', Inventaris: '🧹' }[p.kategori] || '';
    return '<div class="autocomplete-item" data-idx="' + i + '">' +
      '<div class="nm">' + glyph + ' ' + p.namaProduk + '</div>' +
      '<div class="meta">' + p.kategori + ' · Stock: ' + p.stock + ' ' + p.satuan + '</div>' +
      '</div>';
  }).join('');
  listEl.classList.remove('hidden');
  listEl.querySelectorAll('.autocomplete-item').forEach(el => {
    el.addEventListener('click', () => {
      onPick(items[Number(el.dataset.idx)]);
      listEl.classList.add('hidden');
    });
  });
}

/* ---------- BARANG MASUK: baris dinamis ---------- */
let masukRowCount = 0;
function addMasukRow() {
  masukRowCount++;
  const id = 'mrow' + masukRowCount;
  const wrap = document.createElement('div');
  wrap.className = 'item-row';
  wrap.id = id;
  wrap.innerHTML =
    '<button class="hapus-item">✕</button>' +
    '<label class="field-label" style="margin-top:0">Produk</label>' +
    '<div class="autocomplete-wrap">' +
      '<input type="text" class="produk-search" placeholder="Ketik nama produk…" autocomplete="off">' +
      '<div class="autocomplete-list hidden"></div>' +
    '</div>' +
    '<div class="produk-info"></div>' +
    '<label class="field-label qty-input">Qty</label>' +
    '<input type="text" class="qty-field" inputmode="numeric" placeholder="0">';
  document.getElementById('masukItems').appendChild(wrap);

  let selectedProduk = null;
  const searchInput = wrap.querySelector('.produk-search');
  const listEl = wrap.querySelector('.autocomplete-list');
  const infoEl = wrap.querySelector('.produk-info');

  attachAutocomplete(searchInput, listEl, (p) => {
    selectedProduk = p;
    searchInput.value = p.namaProduk;
    infoEl.textContent = 'Stock saat ini: ' + p.stock + ' ' + p.satuan;
    infoEl.className = 'produk-info stock-ok';
  });

  wrap.querySelector('.hapus-item').addEventListener('click', () => wrap.remove());
  wrap._getData = () => selectedProduk ? {
    idProduk: selectedProduk.idProduk,
    namaProduk: selectedProduk.namaProduk,
    qty: wrap.querySelector('.qty-field').value
  } : null;
}
document.getElementById('masukTambahBaris').addEventListener('click', addMasukRow);

document.getElementById('masukSubmit').addEventListener('click', async () => {
  const rows = [...document.querySelectorAll('#masukItems .item-row')];
  const items = rows.map(r => r._getData()).filter(Boolean).filter(i => Number(i.qty) > 0);
  const msgEl = document.getElementById('masukMsg');

  if (items.length === 0) {
    msgEl.textContent = 'Isi minimal 1 produk dengan qty.';
    msgEl.className = 'err';
    return;
  }
  showLoading('Menyimpan barang masuk…');
  try {
    const res = await api('submitBarangMasuk', {
      tanggal: document.getElementById('masukTanggal').value,
      items: items
    });
    hideLoading();
    if (res.success) {
      msgEl.textContent = 'Tersimpan: ' + res.idTransaksi + ' (' + res.jumlahItem + ' produk).';
      msgEl.className = 'ok';
      document.getElementById('masukItems').innerHTML = '';
      masukRowCount = 0;
      addMasukRow();
      loadRingkasan();
    } else {
      msgEl.textContent = res.message;
      msgEl.className = 'err';
    }
  } catch (e) {
    hideLoading();
    msgEl.textContent = 'Gagal terhubung ke server.';
    msgEl.className = 'err';
  }
});

/* ---------- BARANG KELUAR: baris dinamis ---------- */
let keluarRowCount = 0;
function addKeluarRow() {
  keluarRowCount++;
  const id = 'krow' + keluarRowCount;
  const wrap = document.createElement('div');
  wrap.className = 'item-row';
  wrap.id = id;
  wrap.innerHTML =
    '<button class="hapus-item">✕</button>' +
    '<label class="field-label" style="margin-top:0">Produk</label>' +
    '<div class="autocomplete-wrap">' +
      '<input type="text" class="produk-search" placeholder="Ketik nama produk…" autocomplete="off">' +
      '<div class="autocomplete-list hidden"></div>' +
    '</div>' +
    '<div class="produk-info"></div>' +
    '<label class="field-label qty-input">Qty</label>' +
    '<input type="text" class="qty-field" inputmode="numeric" placeholder="0">';
  document.getElementById('keluarItems').appendChild(wrap);

  let selectedProduk = null;
  const searchInput = wrap.querySelector('.produk-search');
  const listEl = wrap.querySelector('.autocomplete-list');
  const infoEl = wrap.querySelector('.produk-info');

  attachAutocomplete(searchInput, listEl, (p) => {
    selectedProduk = p;
    searchInput.value = p.namaProduk;
    updateStockInfo();
  });

  wrap.querySelector('.qty-field').addEventListener('input', updateStockInfo);
  function updateStockInfo() {
    if (!selectedProduk) return;
    const qty = Number(wrap.querySelector('.qty-field').value || 0);
    const cukup = qty <= Number(selectedProduk.stock);
    infoEl.textContent = 'Stock saat ini: ' + selectedProduk.stock + ' ' + selectedProduk.satuan +
      (qty > 0 && !cukup ? ' — TIDAK CUKUP' : '');
    infoEl.className = 'produk-info ' + (cukup ? 'stock-ok' : 'stock-low');
  }

  wrap.querySelector('.hapus-item').addEventListener('click', () => wrap.remove());
  wrap._getData = () => selectedProduk ? {
    idProduk: selectedProduk.idProduk,
    namaProduk: selectedProduk.namaProduk,
    qty: wrap.querySelector('.qty-field').value
  } : null;
}
document.getElementById('keluarTambahBaris').addEventListener('click', addKeluarRow);

async function loadPetugasOptions() {
  const sel = document.getElementById('keluarPetugas');
  if (sel.dataset.loaded) return;
  const res = await api('getAnggota', {});
  if (res.success) {
    res.data.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.nama;
      opt.textContent = a.nama + ' (' + a.jabatan + ')';
      sel.appendChild(opt);
    });
    sel.dataset.loaded = '1';
  }
}

document.getElementById('keluarSubmit').addEventListener('click', async () => {
  const rows = [...document.querySelectorAll('#keluarItems .item-row')];
  const items = rows.map(r => r._getData()).filter(Boolean).filter(i => Number(i.qty) > 0);
  const petugas = document.getElementById('keluarPetugas').value;
  const msgEl = document.getElementById('keluarMsg');

  if (!petugas) {
    msgEl.textContent = 'Pilih petugas dulu.';
    msgEl.className = 'err';
    return;
  }
  if (items.length === 0) {
    msgEl.textContent = 'Isi minimal 1 produk dengan qty.';
    msgEl.className = 'err';
    return;
  }
  showLoading('Menyimpan barang keluar…');
  try {
    const res = await api('submitBarangKeluar', {
      tanggal: document.getElementById('keluarTanggal').value,
      petugas: petugas,
      items: items
    });
    hideLoading();
    if (res.success) {
      msgEl.textContent = 'Tersimpan: ' + res.idTransaksi + ' (' + res.jumlahItem + ' produk).';
      msgEl.className = 'ok';
      document.getElementById('keluarItems').innerHTML = '';
      keluarRowCount = 0;
      addKeluarRow();
      loadRingkasan();
    } else {
      msgEl.textContent = res.message;
      msgEl.className = 'err';
    }
  } catch (e) {
    hideLoading();
    msgEl.textContent = 'Gagal terhubung ke server.';
    msgEl.className = 'err';
  }
});

/* ---------- CEK STOCK ---------- */
let allProdukCache = [];
async function loadStockList() {
  const listEl = document.getElementById('stockList');
  listEl.innerHTML = 'Memuat…';
  const res = await api('listProduk', {});
  if (!res.success) { listEl.textContent = 'Gagal memuat data.'; return; }
  allProdukCache = res.data.filter(p => p.status === 'Aktif');
  renderStockList(allProdukCache);
}
function renderStockList(items) {
  const listEl = document.getElementById('stockList');
  if (items.length === 0) { listEl.innerHTML = '<p style="font-size:13px;color:var(--ink-soft)">Tidak ada produk.</p>'; return; }
  const glyph = { Bar: '🍸', Koki: '🍳', Produk: '📦', Inventaris: '🧹' };
  listEl.innerHTML = items.map(p => {
    const low = Number(p.stock) <= Number(p.minimalStock);
    return '<div class="stock-item ' + (low ? 'low' : '') + '">' +
      '<div><div class="nm">' + (glyph[p.kategori] || '') + ' ' + p.namaProduk + '</div>' +
      '<div class="kat">' + p.kategori + '</div></div>' +
      '<div style="text-align:right"><div class="jml num">' + p.stock + '</div>' +
      '<div class="satuan">' + p.satuan + '</div></div></div>';
  }).join('');
}
document.getElementById('stockSearch').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  renderStockList(allProdukCache.filter(p => p.namaProduk.toLowerCase().includes(q)));
});

/* ---------- TAMBAH PRODUK ---------- */
document.getElementById('tpSubmit').addEventListener('click', async () => {
  const nama = document.getElementById('tpNama').value.trim();
  const kategori = document.getElementById('tpKategori').value;
  const minimal = document.getElementById('tpMinimal').value;
  const msgEl = document.getElementById('tpMsg');

  if (!nama) {
    msgEl.textContent = 'Nama produk wajib diisi.';
    msgEl.className = 'err';
    return;
  }
  showLoading('Menyimpan produk…');
  try {
    const res = await api('addProduk', { namaProduk: nama, kategori: kategori, minimalStock: minimal });
    hideLoading();
    if (res.success) {
      msgEl.textContent = 'Produk tersimpan dengan ID: ' + res.idProduk;
      msgEl.className = 'ok';
      document.getElementById('tpNama').value = '';
      document.getElementById('tpMinimal').value = '';
    } else {
      msgEl.textContent = res.message;
      msgEl.className = 'err';
    }
  } catch (e) {
    hideLoading();
    msgEl.textContent = 'Gagal terhubung ke server.';
    msgEl.className = 'err';
  }
});

/* ---------- init baris pertama ---------- */
addMasukRow();
addKeluarRow();
</script>
