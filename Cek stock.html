<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cek Stock — Gudang Cafe Zero Six</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
</head>
<body>

<header class="topbar" id="appHeader"></header>

<main>
  <div class="screen-header">
    <a class="back-btn" href="menu.html">←</a>
    <span class="screen-title">📋 Cek Stock</span>
  </div>

  <input type="text" class="stock-search" id="stockSearch" placeholder="Cari nama produk (semua kategori)…">

  <div class="kategori-tabs" id="kategoriTabs">
    <button class="kategori-tab active" data-kat="Semua">Semua</button>
    <button class="kategori-tab" data-kat="Bar">🍸 Bar</button>
    <button class="kategori-tab" data-kat="Koki">🍳 Koki</button>
    <button class="kategori-tab" data-kat="Produk">📦 Produk</button>
    <button class="kategori-tab" data-kat="Inventaris">🧹 Inventaris</button>
  </div>

  <div id="stockList"></div>
</main>

<script src="common.js"></script>
<script>
const user = requireLogin();
if (user) renderHeader(user);

let allProduk = [];
let kategoriAktif = 'Semua';

async function loadStock() {
  const listEl = document.getElementById('stockList');
  listEl.innerHTML = 'Memuat…';
  const res = await api('listProduk', {});
  if (!res.success) { listEl.textContent = 'Gagal memuat data.'; return; }
  allProduk = res.data.filter(p => p.status === 'Aktif');
  render();
}

function statusOf(p) {
  const stock = Number(p.stock);
  const minimal = Number(p.minimalStock);
  if (stock <= 0) return 'habis';
  if (stock <= minimal) return 'akan-habis';
  return 'normal';
}

function render() {
  const q = document.getElementById('stockSearch').value.toLowerCase().trim();
  let items = allProduk.filter(p => p.namaProduk.toLowerCase().includes(q));
  if (kategoriAktif !== 'Semua') items = items.filter(p => p.kategori === kategoriAktif);

  const listEl = document.getElementById('stockList');
  if (items.length === 0) {
    listEl.innerHTML = '<p style="font-size:13px;color:var(--ink-soft)">Tidak ada produk.</p>';
    return;
  }

  if (kategoriAktif === 'Semua') {
    // dikelompokkan per kategori supaya gampang dicari
    let html = '';
    KATEGORI_LIST.forEach(kat => {
      const grup = items.filter(p => p.kategori === kat);
      if (grup.length === 0) return;
      html += '<div class="kategori-section-title">' + KATEGORI_GLYPH[kat] + ' ' + kat + ' (' + grup.length + ')</div>';
      html += grup.map(renderItem).join('');
    });
    listEl.innerHTML = html;
  } else {
    listEl.innerHTML = items.map(renderItem).join('');
  }
}

function renderItem(p) {
  const status = statusOf(p);
  const pill = status === 'habis' ? '<span class="status-pill habis">Habis</span>'
    : status === 'akan-habis' ? '<span class="status-pill akan-habis">Akan Habis</span>' : '';
  return '<div class="stock-item ' + status + '">' +
    '<div><div class="nm">' + p.namaProduk + '</div>' +
    '<div class="kat">' + p.kategori + '</div>' + pill + '</div>' +
    '<div style="text-align:right"><div class="jml num">' + p.stock + '</div>' +
    '<div class="satuan">' + p.satuan + '</div></div></div>';
}

document.getElementById('stockSearch').addEventListener('input', render);
document.querySelectorAll('.kategori-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.kategori-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    kategoriAktif = btn.dataset.kat;
    render();
  });
});

loadStock();
</script>
</body>
</html>
